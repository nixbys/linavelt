name: "OSSAR Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ossar-scan:
    name: Run OSSAR Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Run OSSAR Scan
      uses: microsoft/ossar-action@v1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
