version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    command: npm run electron:start
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: appuser

  db:
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    runtime: runc

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Containerfile
    ports:
      - "3000:3000"
    volumes:
      - ./mcp-server:/usr/src/app
    restart: always
